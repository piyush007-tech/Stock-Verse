<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login • StockVerse</title>
  <link rel="stylesheet" href="login.css" />
</head>

<body>

<div class="scene">

  <!-- REALISTIC CARTOON BUSINESSMAN (SVG) -->
  <svg class="businessman" viewBox="0 0 300 520" aria-hidden="true">

    <!-- Shadow -->
    <ellipse cx="150" cy="500" rx="70" ry="14" fill="rgba(0,0,0,0.25)" />

    <!-- Head -->
    <circle cx="150" cy="80" r="38" fill="#f2c7a5"/>

    <!-- Hair -->
    <path d="M112 78 C120 30, 180 30, 188 78
             Q150 52 112 78" fill="#2b2b2b"/>

    <!-- Eyes -->
    <ellipse cx="138" cy="82" rx="4" ry="6" fill="#1f2937"/>
    <ellipse cx="162" cy="82" rx="4" ry="6" fill="#1f2937"/>

    <!-- Brows -->
    <path d="M130 70 Q138 66 146 70" stroke="#2b2b2b" stroke-width="2" fill="none"/>
    <path d="M154 70 Q162 66 170 70" stroke="#2b2b2b" stroke-width="2" fill="none"/>

    <!-- Nose -->
    <path d="M150 86 Q146 98 150 100 Q154 98 150 86"
          fill="#e0b18e"/>

    <!-- Mouth -->
    <path d="M138 112 Q150 118 162 112"
          stroke="#9f1239" stroke-width="2" fill="none"/>

    <!-- Neck -->
    <rect x="138" y="118" width="24" height="20" rx="8" fill="#e0b18e"/>

    <!-- Suit Body -->
    <path d="M100 140 Q150 110 200 140 V310
             Q150 330 100 310 Z"
          fill="#1f2937"/>

    <!-- Shirt -->
    <polygon points="150,140 132,210 168,210" fill="#f8fafc"/>

    <!-- Tie -->
    <polygon points="150,150 142,230 150,260 158,230"
             fill="#b91c1c"/>

    <!-- Left Arm -->
    <path d="M100 160 C70 200, 70 250, 90 290"
          stroke="#1e293b" stroke-width="26" stroke-linecap="round"/>

    <!-- Right Arm -->
    <path d="M200 160 C230 210, 230 250, 210 290"
          stroke="#1e293b" stroke-width="26" stroke-linecap="round"/>

    <!-- SUITCASE (REALISTIC) -->
<g class="suitcase">
  
  <!-- Bottom part -->
  <rect x="190" y="300" width="100" height="55" rx="10" fill="#1f2937"/>

  <!-- Inner lining -->
  <rect x="195" y="305" width="90" height="45" rx="8" fill="#374151"/>

  <!-- Suitcase lid -->
  <g class="suitcase-lid">
    <rect x="190" y="260" width="100" height="45" rx="10" fill="#111827"/>
    
    <!-- Lid inner -->
    <rect x="195" y="265" width="90" height="35" rx="8" fill="#1f2937"/>
  </g>

  <!-- Handle -->
  <rect x="225" y="245" width="30" height="10" rx="5" fill="#4b5563"/>

  <!-- Lock -->
  <rect x="238" y="320" width="14" height="12" rx="3" fill="#9ca3af"/>

</g>

    <!-- Legs -->
    <rect x="122" y="310" width="24" height="150" rx="12" fill="#0f1111"/>
    <rect x="154" y="310" width="24" height="150" rx="12" fill="#0f1111"/>

  </svg>

  <!-- LOGIN BOX -->
 <div class="login-box">
  <h2 id="title">Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button id="loginBtn">Login</button>

<span id="forgotPassword">Forgot password?</span> <br>
<p id="signupText1">Don't have an account?</p>
<p id="signupText">Create one</p>

    </p>
  </div>
</div>
<script type="module" src="login.js"></script>




</div>

<footer>©2026 StockVerse. All rights reserved.</footer>

</body>
</html>
